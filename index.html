<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockPulse – Enterprise POS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
    body { background: #f1f5f9; min-height: 100vh; }
    .login-card { background: white; border-radius: 1.5rem; padding: 2rem; max-width: 400px; margin: 10vh auto; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15); }
    .login-card h2 { text-align: center; margin-bottom: 1.5rem; }
    .login-card input { width: 100%; padding: 12px; margin-bottom: 1rem; border: 1px solid #cbd5e1; border-radius: 0.75rem; }
    .login-card button { width: 100%; background: #4f46e5; color: white; border: none; padding: 12px; border-radius: 0.75rem; font-weight: bold; cursor: pointer; }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 8px 16px; border-radius: 40px; font-size: 14px; z-index: 9999; display: none; }
    .toast.show { display: block; }
    .error { color: #dc2626; text-align: center; margin-top: 8px; }
  </style>
</head>
<body>

<div id="loginScreen" class="login-card">
  <h2>📦 StockPulse</h2>
  <input type="email" id="loginEmail" placeholder="Email" value="admin@yourstore.com">
  <input type="password" id="loginPassword" placeholder="Password" value="admin123">
  <button id="loginBtn">Sign In →</button>
  <div id="loginError" class="error"></div>
</div>

<div id="mainApp" style="display: none;">
  <div style="background: white; padding: 20px; text-align: center;">
    <h2>✅ Login successful</h2>
    <p>Welcome, <span id="userName"></span> (<span id="userRole"></span>)</p>
    <button id="logoutBtn" style="margin-top: 20px;">Logout</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
  // ==================== CONFIGURATION ====================
  const API_URL = "https://script.google.com/macros/s/AKfycbwRbZWFnku1MsCY8upgJ1wded0Wr_tc_0aXEVuZC1uNx3wNQ-hjehXy-DCWAqDJEw7xRw/exec";
  let sessionToken = null;
  let currentUser = null;

  // ==================== HELPERS ====================
  function showToast(msg, isError = false) {
    const toast = document.getElementById("toast");
    toast.textContent = msg;
    toast.style.backgroundColor = isError ? "#ef4444" : "#10b981";
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 3000);
  }

  // ==================== API CALL ====================
  async function apiCall(action, extra = {}) {
    const payload = new URLSearchParams();
    payload.append("action", action);
    if (sessionToken) payload.append("token", sessionToken);
    for (let k in extra) if (extra.hasOwnProperty(k)) payload.append(k, extra[k]);
    const resp = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: payload
    });
    const text = await resp.text();
    try {
      const json = JSON.parse(text);
      if (!json.success) throw new Error(json.error);
      return json;
    } catch(e) {
      throw new Error(e.message);
    }
  }

  // ==================== LOGIN ====================
  async function login(email, password) {
    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: new URLSearchParams({ action: "login", email, password })
      });
      const json = JSON.parse(await res.text());
      if (!json.success) {
        document.getElementById("loginError").innerText = json.error;
        return;
      }
      sessionToken = json.token;
      currentUser = json.user;
      sessionStorage.setItem("sp_token", sessionToken);
      sessionStorage.setItem("sp_user", JSON.stringify(currentUser));

      document.getElementById("loginScreen").style.display = "none";
      document.getElementById("mainApp").style.display = "block";
      document.getElementById("userName").innerText = currentUser.fullName || currentUser.email;
      document.getElementById("userRole").innerText = currentUser.role.toUpperCase();
      showToast("Login successful", false);
    } catch(err) {
      document.getElementById("loginError").innerText = err.message;
    }
  }

  function logout() {
    sessionToken = null;
    currentUser = null;
    sessionStorage.removeItem("sp_token");
    sessionStorage.removeItem("sp_user");
    document.getElementById("mainApp").style.display = "none";
    document.getElementById("loginScreen").style.display = "block";
    document.getElementById("loginEmail").value = "admin@yourstore.com";
    document.getElementById("loginPassword").value = "admin123";
    document.getElementById("loginError").innerText = "";
  }

  // ==================== INIT ====================
  window.addEventListener("load", () => {
    const token = sessionStorage.getItem("sp_token");
    const user = sessionStorage.getItem("sp_user");
    if (token && user) {
      sessionToken = token;
      currentUser = JSON.parse(user);
      document.getElementById("loginScreen").style.display = "none";
      document.getElementById("mainApp").style.display = "block";
      document.getElementById("userName").innerText = currentUser.fullName || currentUser.email;
      document.getElementById("userRole").innerText = currentUser.role.toUpperCase();
    }
  });

  document.getElementById("loginBtn").onclick = () => {
    const email = document.getElementById("loginEmail").value.trim();
    const password = document.getElementById("loginPassword").value;
    login(email, password);
  };
  document.getElementById("logoutBtn").onclick = logout;
</script>
</body>
</html>
