<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockPulse | Enterprise POS</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:system-ui; }
    body { background:#f1f5f9; min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .login-card { background:white; border-radius:1.5rem; padding:2rem; width:100%; max-width:400px; box-shadow:0 20px 35px -12px rgba(0,0,0,0.15); }
    .login-card h2 { text-align:center; margin-bottom:1.5rem; }
    .login-card input { width:100%; padding:12px; margin-bottom:1rem; border:1px solid #cbd5e1; border-radius:0.75rem; }
    .login-card button { width:100%; background:#4f46e5; color:white; border:none; padding:12px; border-radius:0.75rem; font-weight:bold; cursor:pointer; }
    .login-card button:hover { background:#4338ca; }
    .error { color:#dc2626; text-align:center; margin-top:0.5rem; }
    .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#1e293b; color:white; padding:8px 16px; border-radius:40px; font-size:14px; z-index:9999; display:none; }
    .toast.show { display:block; }
  </style>
</head>
<body>
  <div id="loginCard" class="login-card">
    <h2>📦 StockPulse</h2>
    <input type="email" id="loginEmail" placeholder="Email" value="admin@yourstore.com">
    <input type="password" id="loginPassword" placeholder="Password" value="admin123">
    <button id="loginBtn">Sign In →</button>
    <div id="loginError" class="error"></div>
  </div>

  <div id="mainApp" style="display:none;">
    <h2>✅ Logged in</h2>
    <p id="userInfo"></p>
    <button onclick="logout()">Logout</button>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    // ==================== CONFIGURATION ====================
    const API_URL = "https://script.google.com/macros/s/AKfycbwRbZWFnku1MsCY8upgJ1wded0Wr_tc_0aXEVuZC1uNx3wNQ-hjehXy-DCWAqDJEw7xRw/exec";
    let sessionToken = null;
    let currentUser = null;

    // ==================== TOAST ====================
    function showToast(msg, isError = false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.background = isError ? '#ef4444' : '#10b981';
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    // ==================== LOGIN ====================
    async function login(email, password) {
      const errorEl = document.getElementById('loginError');
      errorEl.textContent = '';
      try {
        // Show loading state
        const btn = document.getElementById('loginBtn');
        btn.disabled = true;
        btn.textContent = 'Logging in...';

        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({ action: 'login', email, password })
        });

        const text = await response.text();
        let json;
        try { json = JSON.parse(text); } catch(e) { throw new Error('Server returned invalid response'); }

        if (!json.success) {
          throw new Error(json.error || 'Invalid credentials');
        }

        sessionToken = json.token;
        currentUser = json.user;
        sessionStorage.setItem('sp_token', sessionToken);
        sessionStorage.setItem('sp_user', JSON.stringify(currentUser));

        // Show main app
        document.getElementById('loginCard').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('userInfo').textContent = `Welcome ${currentUser.fullName || currentUser.email} (${currentUser.role})`;
        showToast('Login successful', false);

        // Redirect to full dashboard (if you have it)
        // window.location.href = 'dashboard.html';
        // For now, just show success.

      } catch (err) {
        errorEl.textContent = err.message || 'Something went wrong';
        showToast(err.message, true);
      } finally {
        const btn = document.getElementById('loginBtn');
        btn.disabled = false;
        btn.textContent = 'Sign In →';
      }
    }

    function logout() {
      sessionToken = null;
      currentUser = null;
      sessionStorage.removeItem('sp_token');
      sessionStorage.removeItem('sp_user');
      document.getElementById('mainApp').style.display = 'none';
      document.getElementById('loginCard').style.display = 'block';
      document.getElementById('loginError').textContent = '';
    }

    // ==================== EVENT BINDINGS ====================
    document.addEventListener('DOMContentLoaded', function() {
      // Check if already logged in
      const token = sessionStorage.getItem('sp_token');
      const user = sessionStorage.getItem('sp_user');
      if (token && user) {
        sessionToken = token;
        currentUser = JSON.parse(user);
        document.getElementById('loginCard').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('userInfo').textContent = `Welcome back ${currentUser.fullName || currentUser.email}`;
        return;
      }

      // Attach login button
      const loginBtn = document.getElementById('loginBtn');
      loginBtn.addEventListener('click', function(e) {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        if (!email || !password) {
          document.getElementById('loginError').textContent = 'Please enter email and password';
          return;
        }
        login(email, password);
      });

      // Also allow Enter key
      document.getElementById('loginPassword').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') loginBtn.click();
      });
      document.getElementById('loginEmail').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') loginBtn.click();
      });
    });

    // ==================== TEST API REACHABILITY ====================
    // (Optional) Check if backend is reachable
    fetch(API_URL, { method: 'GET' })
      .then(r => r.text())
      .then(text => {
        try {
          const json = JSON.parse(text);
          if (json.status === 'ok') console.log('✅ Backend reachable');
        } catch(e) {
          console.warn('⚠️ Backend not responding with JSON. Check deployment.');
        }
      })
      .catch(() => console.warn('⚠️ Cannot reach backend. Check URL / CORS.'));
  </script>
</body>
</html>
