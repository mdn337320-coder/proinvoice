<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockPulse Login</title>
  <style>
    body { font-family: system-ui; background: #f4f6f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .login-box { background: white; padding: 2rem; border-radius: 1.5rem; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15); width: 100%; max-width: 400px; }
    .login-box h2 { text-align: center; margin-bottom: 1.5rem; }
    .login-box input { width: 100%; padding: 12px; margin-bottom: 1rem; border: 1px solid #cbd5e1; border-radius: 0.75rem; }
    .login-box button { width: 100%; padding: 12px; background: #4f46e5; color: white; border: none; border-radius: 0.75rem; font-weight: bold; cursor: pointer; }
    .login-box button:hover { background: #4338ca; }
    .error { color: #dc2626; text-align: center; margin-top: 0.5rem; }
    #status { margin-top: 0.5rem; text-align: center; font-size: 0.9rem; color: #4b5563; }
  </style>
</head>
<body>

<div class="login-box">
  <h2>📦 StockPulse</h2>
  <input type="email" id="email" placeholder="Email" value="admin@yourstore.com">
  <input type="password" id="password" placeholder="Password" value="admin123">
  <button id="loginBtn">Sign In →</button>
  <div id="error" class="error"></div>
  <div id="status"></div>
</div>

<script>
// ========== CONFIG ==========
const API_URL = "https://script.google.com/macros/s/AKfycbwRbZWFnku1MsCY8upgJ1wded0Wr_tc_0aXEVuZC1uNx3wNQ-hjehXy-DCWAqDJEw7xRw/exec";

// ========== ELEMENTS ==========
const email = document.getElementById('email');
const password = document.getElementById('password');
const loginBtn = document.getElementById('loginBtn');
const errorDiv = document.getElementById('error');
const statusDiv = document.getElementById('status');

// ========== LOGIN FUNCTION ==========
async function login() {
  errorDiv.textContent = '';
  statusDiv.textContent = '⏳ Logging in...';
  loginBtn.disabled = true;

  try {
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        action: 'login',
        email: email.value.trim(),
        password: password.value
      })
    });

    const text = await response.text();
    console.log('Raw response:', text);

    let json;
    try {
      json = JSON.parse(text);
    } catch (e) {
      throw new Error('Server returned invalid response');
    }

    if (!json.success) {
      throw new Error(json.error || 'Login failed');
    }

    // Success
    statusDiv.textContent = '✅ Login successful! Token: ' + json.token.substring(0, 20) + '...';
    errorDiv.textContent = '';
    // Store token and user
    sessionStorage.setItem('sp_token', json.token);
    sessionStorage.setItem('sp_user', JSON.stringify(json.user));
    // Redirect to full dashboard (if you have one)
    // window.location.href = 'dashboard.html';

  } catch (err) {
    errorDiv.textContent = '❌ ' + err.message;
    statusDiv.textContent = '';
  } finally {
    loginBtn.disabled = false;
  }
}

// ========== EVENT LISTENER ==========
loginBtn.addEventListener('click', login);

// Allow Enter key on both fields
email.addEventListener('keydown', (e) => { if (e.key === 'Enter') login(); });
password.addEventListener('keydown', (e) => { if (e.key === 'Enter') login(); });
</script>

</body>
</html>
